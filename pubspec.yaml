name: riddles_words
description: "Riddles - Words: 100 word riddles, anagrams and wordplay levels."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  go_router: ^16.0.0
  google_mobile_ads: ^9.0.0
  url_launcher: ^6.3.1
  share_plus: ^11.0.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/levels.json
